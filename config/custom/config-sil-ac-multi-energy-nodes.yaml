  # ── CP01 ──────────────────────────────────────────────────────────────────
  cp01_sink:
    module: EnergyNode
    mapping:
      module:
        evse: 1
    config_module:
      fuse_limit_A: 32
      phase_count: 3
    connections:
      energy_consumer:
        - module_id: cp01
          implementation_id: energy_grid

  cp01:
    module: EvseManager
    mapping:
      module:
        evse: 1
    config_module:
      connector_id: 1
      evse_id: DE*CBG*E00001*1
      charge_mode: AC
      ac_nominal_voltage: 230
      ac_hlc_enabled: false
      ac_hlc_use_5percent: false
      ac_enforce_hlc: false
      session_logging: false
    connections:
      bsp:
        - module_id: cp01_yeti
          implementation_id: board_support
      powermeter_grid_side:
        - module_id: cp01_yeti
          implementation_id: powermeter

  cp01_yeti:
    module: YetiSimulator
    config_module:
      connector_id: 1

  cp01_ev:
    module: EvManager
    config_module:
      connector_id: 1
      auto_enable: true
      auto_exec: false
    connections:
      ev:
        - module_id: EV01
          implementation_id: ev
      ev_board_support:
        - module_id: cp01_yeti
          implementation_id: ev_board_support

  EV01:
    module: PyEvJosev
    config_module:
      device: auto
      supported_ISO15118_2: false
    connections: {}

