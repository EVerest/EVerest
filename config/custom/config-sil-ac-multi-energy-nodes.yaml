active_modules:

  # ── Energy Management ──────────────────────────────────────────────────────
  energy_manager:
    module: EnergyManager
    config_module:
      schedule_total_duration: 2
      schedule_interval_duration: 15
      debug: false
    connections:
      energy_trunk:
        - module_id: grid_connection_point
          implementation_id: energy_grid

  # ── ClusterM0 fallback EnergyNode ─────────────────────────────────────────
  # Acts as the "ClusterM fallback limit" node (see architecture diagram).
  # The local L0 EnergyManager connects here as its energy trunk. This node
  # enforces the cluster-level fuse limit (63 A) before passing limits down
  # to cluster_m0_api. When the external L1 EnergyManager is active, L1's
  # limits (via external MQTT) take priority and L0's limits are silently
  # discarded by cluster_m0_api.
  # TODO: wire powermeter once cluster meter is available
  grid_connection_point:
    module: EnergyNode
    config_module:
      fuse_limit_A: 63
      phase_count: 3
      nominal_voltage_V: 230.0
    connections:
      energy_consumer:
        - module_id: cluster_m0_api
          implementation_id: energy_grid
#        - module_id: cluster_m1_api
#          implementation_id: energy_grid
#        - module_id: cluster_m3_api
#          implementation_id: energy_grid

  # ── ClusterM0 API server — CP01–CP06 ──────────────────────────────────────
  # Bridges the cluster's EVSE EnergyNodes to the site-level L1 EnergyManager.
  # Aggregates energy_flow_requests from CP01–CP06 and publishes to external
  # MQTT so the L1 process can see them via external_energy_node_API_client.
  # Incoming enforce_limits from L1 are routed to CP01–CP06 (takes priority).
  # When L1 is silent for timeout_s, falls back to limits from the local L0
  # EnergyManager (via grid_connection_point → energy_grid interface above).
  cluster_m0_api:
    module: external_energy_node_API
    config_module:
      timeout_s: 30
    connections:
      energy_consumer:
        - module_id: cp01_sink
          implementation_id: energy_grid
        - module_id: cp02_sink
          implementation_id: energy_grid
        - module_id: cp03_sink
          implementation_id: energy_grid
        - module_id: cp04_sink
          implementation_id: energy_grid
        - module_id: cp05_sink
          implementation_id: energy_grid
        - module_id: cp06_sink
          implementation_id: energy_grid

