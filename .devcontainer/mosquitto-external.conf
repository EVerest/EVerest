# Secondary Mosquitto broker for cross-process energy_grid communication.
# The external energy manager process (config-external-energy-manager.yaml) uses
# this as its primary MQTT broker. A bridge forwards energy_grid topics
# bidirectionally to/from the cluster process's primary Mosquitto broker.

listener 1883
allow_anonymous true

# Persistence off for SIL — clean state on restart
persistence false

# Logging
log_type error
log_type warning
log_type notice

# ── Bridge to cluster-process primary Mosquitto broker ─────────────────────
# Forwards ApiHelper topics bidirectionally so that:
#   external_energy_node_API (cluster process, mosquitto:1883) can reach
#   external_energy_node_API_client (external manager, mosquitto-external:1883)
#   and vice versa.
#
# Topic convention (ApiHelper):
#   everest_api/1/external_energy_node/{server_id}/e2m/energy_flow_request
#     — cluster → external mgr (server publishes, client subscribes)
#   everest_api/1/external_energy_node/{server_id}/m2e/enforce_limits
#     — external mgr → cluster (client publishes, server subscribes)
#   everest_api/1/external_energy_node/{server_id}/e2m/heartbeat
#   everest_api/1/external_energy_node/{server_id}/e2m/communication_check
#     — ApiHelper infrastructure topics
#
# Direction "both" means: publish on either broker is forwarded to the other.
# Bridging all everest_api/# covers current and future API modules.
connection cluster_bridge
address mqtt-server:1883
bridge_attempt_unsubscribe false
topic everest_api/# both 0
# Uncomment the lines below to bridge only specific clusters instead of all API traffic:
# topic everest_api/1/external_energy_node/cluster_m0_api/# both 0
# topic everest_api/1/external_energy_node/cluster_m1_api/# both 0
# topic everest_api/1/external_energy_node/cluster_m3_api/# both 0
