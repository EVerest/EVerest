description: >-
  Energy switching interface for the internal EnergyManager path. Extends the standard
  energy interface with an active_source variable so consumers can observe whether
  the external (primary) or internal (fallback) EnergyManager is currently dictating limits.
cmds:
  enforce_limits:
    description: >-
      Called by the internal EnergyManager chain to enforce limits. Applied only when
      the external manager has been silent longer than external_timeout_s.
    arguments:
      value:
        description: Limit object routed to leaf nodes when internal fallback is active.
        type: object
        $ref: /energy#/EnforcedLimits
vars:
  energy_flow_request:
    description: >-
      Aggregated energy flow request from all connector nodes, forwarded to the
      internal EnergyManager so it stays warm and can take over immediately on
      external manager loss.
    type: object
    $ref: /energy#/EnergyFlowRequest
  active_source:
    description: >-
      Indicates which EnergyManager is currently dictating limits for this cluster.
    type: string
    enum:
      - external
      - internal_fallback
