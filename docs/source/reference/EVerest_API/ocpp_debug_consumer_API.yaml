---
asyncapi: 3.0.0
id: pionix:de:everest:ocpp_debug_consumer_API
info:
  title: EVerest API definition for ocpp debug consumer
  version: 1.0.0
  description: >-
    API for EVerest API clients that consume ocpp debug messages from an OCPP module.
  license:
    name: Apache-2.0
    url: https://opensource.org/licenses/Apache-2.0
  tags:
  - name: EVerest
  - name: OCPP
servers:
  default:
    pathname: everest_api/1/ocpp_debug_consumer/{module_id}
    host: localhost:1883
    description: default local MQTT
    protocol: mqtt
    variables:
      module_id:
        description: The ID of the module as defined in the EVerest config file.
defaultContentType: application/json


channels:
  ########## ocpp_debug
  receive_ocpp_message:
    address: e2m/ocpp_message
    messages:
      receive_ocpp_message:
        $ref: '#/components/messages/receive_ocpp_message'


  receive_heartbeat:
    address: e2m/heartbeat
    messages:
      receive_heartbeat:
        $ref: '#/components/messages/receive_heartbeat'
  send_communication_check:
    address: m2e/communication_check
    messages:
      send_communication_check:
        $ref: '#/components/messages/send_communication_check'



operations:
  ########## ocpp_debug
  receive_ocpp_message:
    title: Receive ocpp message
    action: receive
    channel:
      $ref: '#/channels/receive_ocpp_message'
    description: A serialized OCPP message


  receive_heartbeat:
    title: Receive heartbeat
    action: receive
    channel:
      $ref: '#/channels/receive_heartbeat'
  send_communication_check:
    title: Send communication check
    action: send
    channel:
      $ref: '#/channels/send_communication_check'



components:
  messages:
    receive_ocpp_message:
      name: receive_ocpp_message
      title: Receive ocpp message
      summary: A serialized OCPP message
      contentType: application/json
      payload:
        $ref: '#/components/schemas/Message'

    receive_heartbeat:
      name: receive_heartbeat
      title: Receive heartbeat
      summary: >-
        Heartbeat produced by EVerest as configured via cfg_heartbeat_interval_ms in the EVerest configuration
      contentType: application/json
      payload:
        $ref: '#/components/schemas/HeartBeatId'
      examples:
      - summary: Heartbeat
        payload: 42
    send_communication_check:
      name: send_communication_check
      title: Send communication check
      summary: Signal to EVerest that communication is good or check shall be stopped
      contentType: application/json
      payload:
        $ref: '#/components/schemas/CommunicationCheck'
      examples:
      - summary: CommunicationCheck
        payload: true


  schemas:
    MessageDirection:
      description: OCPP message direction
      type: string
      enum:
      - CSMSToChargingStation
      - ChargingStationToCSMS
    Message:
      description: OCPP message with direction
      type: object
      required:
      - message
      - direction
      properties:
        message:
          description: Serialized OCPP-J message
          type: string
        direction:
          description: OCPP message direction
          type: string
          $ref: '#/components/schemas/MessageDirection'
        version:
          description: OCPP version of the serialized message
          type: string
      additionalProperties: true

    HeartBeatId:
      type: integer
      description: >-
        64bit unsigned integer. The id of every heartbeat increases by 1 and overflows when the maximum representable value
        is reached
    CommunicationCheck:
      type: boolean
      description: >-
        Send 'true' at least every 'cfg_communication_check_to_s' seconds to signal module is alive. Send 'false' to stop
        communication check
