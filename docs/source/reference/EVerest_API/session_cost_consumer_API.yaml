---
asyncapi: 3.0.0
id: 'pionix:de:everest:session_cost_consumer_API'
info:
  title: 'EVerest API definition for session cost consumer'
  version: 1.0.0
  description: >-
    API for EVerest API clients that consume session cost and tariff
    information from the `session_cost` interface. See the
    Integrate Tariff and Cost how-to guide for OCPP-specific
    configuration and message flow details.

  license:
    name: Apache-2.0
    url: https://opensource.org/licenses/Apache-2.0
  tags:
    - name: EVerest
    - name: SessionCost
servers:
  default:
    pathname: 'everest_api/1/session_cost_consumer/{module_id}'
    host: 'localhost:1883'
    description: default local MQTT
    protocol: mqtt
    variables:
      module_id:
        description: The ID of the module as defined in the EVerest config file.
defaultContentType: application/json


channels:
  receive_default_price:
    address: 'e2m/default_price'
    messages:
      default_price:
        $ref: '#/components/messages/receive_default_price'
  receive_tariff_message:
    address: 'e2m/tariff_message'
    messages:
      tariff_message:
        $ref: '#/components/messages/receive_tariff_message'
  receive_session_cost:
    address: 'e2m/session_cost'
    messages:
      session_cost:
        $ref: '#/components/messages/receive_session_cost'
  send_request_get_default_price:
    address: 'm2e/default_price/get'
    messages:
      send_request_get_default_price:
        $ref: '#/components/messages/send_request_get_default_price'
  receive_reply_get_default_price:
    address: null
    messages:
      receive_reply_get_default_price:
        $ref: '#/components/messages/receive_reply_get_default_price'
  send_request_get_tariff_message:
    address: 'm2e/tariff_message/get'
    messages:
      send_request_get_tariff_message:
        $ref: '#/components/messages/send_request_get_tariff_message'
  receive_reply_get_tariff_message:
    address: null
    messages:
      receive_reply_get_tariff_message:
        $ref: '#/components/messages/receive_reply_get_tariff_message'
  send_request_get_session_cost:
    address: 'm2e/session_cost/get'
    messages:
      send_request_get_session_cost:
        $ref: '#/components/messages/send_request_get_session_cost'
  receive_reply_get_session_cost:
    address: null
    messages:
      receive_reply_get_session_cost:
        $ref: '#/components/messages/receive_reply_get_session_cost'


  receive_heartbeat:
    address: 'e2m/heartbeat'
    messages:
      receive_heartbeat:
        $ref: '#/components/messages/receive_heartbeat'
  send_communication_check:
    address: 'm2e/communication_check'
    messages:
      send_communication_check:
        $ref: '#/components/messages/send_communication_check'



operations:
  receive_default_price:
    title: 'Receive default price'
    action: receive
    channel:
      $ref: '#/channels/receive_default_price'
    description: >-
      Published once on startup and again whenever the applicable default price
      changes (e.g. after a connectivity state change or a configuration
      update). Contains human-readable price text in one or more languages.
      Absent if no default price is configured.
  receive_tariff_message:
    title: 'Receive tariff message'
    action: receive
    channel:
      $ref: '#/channels/receive_tariff_message'
    description: >-
      Published at authorization time and whenever the CSMS sends updated
      pricing during a session. Contains human-readable price text in one
      or more languages.
  receive_session_cost:
    title: 'Receive session cost'
    action: receive
    channel:
      $ref: '#/channels/receive_session_cost'
    description: >-
      Published periodically during a session and once when it ends.
      Contains session cost broken down into chunks, current and upcoming
      pricing, and optional display messages.
  send_request_get_default_price:
    title: 'Request current Default Price'
    action: send
    channel:
      $ref: '#/channels/send_request_get_default_price'
    description: >-
      Request the most recently published (latched) Default Price.
      The reply will be sent to the replyTo address specified in the message headers.
      If no latched value is available yet, no reply will be sent.
    reply:
      address:
        location: "$message.header#/replyTo"
      channel:
        $ref: '#/channels/receive_reply_get_default_price'
  receive_reply_get_default_price:
    title: 'Reply to get Default Price request'
    action: receive
    channel:
      $ref: '#/channels/receive_reply_get_default_price'
  send_request_get_tariff_message:
    title: 'Request current Tariff Message'
    action: send
    channel:
      $ref: '#/channels/send_request_get_tariff_message'
    description: >-
      Request the most recently published (latched) Tariff Message.
      The reply will be sent to the replyTo address specified in the message headers.
      If no latched value is available yet, no reply will be sent.
    reply:
      address:
        location: "$message.header#/replyTo"
      channel:
        $ref: '#/channels/receive_reply_get_tariff_message'
  receive_reply_get_tariff_message:
    title: 'Reply to get Tariff Message request'
    action: receive
    channel:
      $ref: '#/channels/receive_reply_get_tariff_message'
  send_request_get_session_cost:
    title: 'Request current Session Cost'
    action: send
    channel:
      $ref: '#/channels/send_request_get_session_cost'
    description: >-
      Request the most recently published (latched) Session Cost.
      The reply will be sent to the replyTo address specified in the message headers.
      If no latched value is available yet, no reply will be sent.
    reply:
      address:
        location: "$message.header#/replyTo"
      channel:
        $ref: '#/channels/receive_reply_get_session_cost'
  receive_reply_get_session_cost:
    title: 'Reply to get Session Cost request'
    action: receive
    channel:
      $ref: '#/channels/receive_reply_get_session_cost'


  receive_heartbeat:
    title: 'Receive heartbeat'
    action: receive
    channel:
      $ref: '#/channels/receive_heartbeat'
  send_communication_check:
    title: 'Send communication check'
    action: send
    channel:
      $ref: '#/channels/send_communication_check'



components:
  messages:
    receive_default_price:
      name: receive_default_price
      title: 'Receive default price'
      summary: 'Currently applicable default pricing text for this charger'
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DefaultPrice'
    receive_tariff_message:
      name: receive_tariff_message
      title: 'Receive tariff message'
      summary: 'Tariff and pricing information for a charging session'
      contentType: application/json
      payload:
        $ref: 'session_cost_API.yaml#/components/schemas/TariffMessage'
    receive_session_cost:
      name: receive_session_cost
      title: 'Receive session cost'
      summary: 'Running or final cost of a charging session'
      contentType: application/json
      payload:
        $ref: 'session_cost_API.yaml#/components/schemas/SessionCost'
    send_request_get_default_price:
      name: send_request_get_default_price
      title: 'Request current Default Price'
      summary: 'Request the most recently published (latched) Default Price.'
      contentType: application/json
      payload:
        type: object
        required:
          - headers
        properties:
          headers:
            type: object
            required:
              - replyTo
            properties:
              replyTo:
                type: string
                description: Address to send the response to.
      examples:
        - summary: ""
          payload:
            headers:
              replyTo: everest_api/1/{interface_type}/{module_id}/e2m/{operation_name}/{uuid}
    receive_reply_get_default_price:
      name: receive_reply_get_default_price
      title: 'Reply to get Default Price request'
      summary: 'The most recently published Default Price.'
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DefaultPrice'
    send_request_get_tariff_message:
      name: send_request_get_tariff_message
      title: 'Request current Tariff Message'
      summary: 'Request the most recently published (latched) Tariff Message.'
      contentType: application/json
      payload:
        type: object
        required:
          - headers
        properties:
          headers:
            type: object
            required:
              - replyTo
            properties:
              replyTo:
                type: string
                description: Address to send the response to.
      examples:
        - summary: ""
          payload:
            headers:
              replyTo: everest_api/1/{interface_type}/{module_id}/e2m/{operation_name}/{uuid}
    receive_reply_get_tariff_message:
      name: receive_reply_get_tariff_message
      title: 'Reply to get Tariff Message request'
      summary: 'The most recently published Tariff Message.'
      contentType: application/json
      payload:
        $ref: 'session_cost_API.yaml#/components/schemas/TariffMessage'
    send_request_get_session_cost:
      name: send_request_get_session_cost
      title: 'Request current Session Cost'
      summary: 'Request the most recently published (latched) Session Cost.'
      contentType: application/json
      payload:
        type: object
        required:
          - headers
        properties:
          headers:
            type: object
            required:
              - replyTo
            properties:
              replyTo:
                type: string
                description: Address to send the response to.
      examples:
        - summary: ""
          payload:
            headers:
              replyTo: everest_api/1/{interface_type}/{module_id}/e2m/{operation_name}/{uuid}
    receive_reply_get_session_cost:
      name: receive_reply_get_session_cost
      title: 'Reply to get Session Cost request'
      summary: 'The most recently published Session Cost.'
      contentType: application/json
      payload:
        $ref: 'session_cost_API.yaml#/components/schemas/SessionCost'


    receive_heartbeat:
      name: receive_heartbeat
      title: 'Receive heartbeat'
      summary: Heartbeat produced by EVerest as configured via cfg_heartbeat_interval_ms in the EVerest configuration
      contentType: application/json
      payload:
        $ref: '#/components/schemas/HeartBeatId'
      examples:
        - summary: "Heartbeat"
          payload: 42

    send_communication_check:
      name: send_communication_check
      title: 'Send communication check'
      summary: Signal to EVerest that communication is good or check shall be stopped
      contentType: application/json
      payload:
        $ref: '#/components/schemas/CommunicationCheck'
      examples:
        - summary: "CommunicationCheck"
          payload:
            true


  schemas:
    DefaultPrice:
      description: >-
        The currently applicable default pricing text for this charger,
        independent of any active session. Contains human-readable text only —
        no computed cost amounts are included. Published once on startup and
        again whenever the applicable price changes (e.g. after a connectivity
        state change or a configuration update).
      type: object
      additionalProperties: false
      required:
        - messages
      properties:
        messages:
          description: >-
            Price text in one or more languages. The first entry uses the
            configured default language.
          type: array
          items:
            description: Price text in a specific language
            type: object
            $ref: 'display_message_API.yaml#/components/schemas/MessageContent'
    CommunicationCheck:
      type: boolean
      description: "Send 'true' at least every 'cfg_communication_check_to_s' seconds to signal module is alive. Send 'false' to stop communication check'"

    HeartBeatId:
      type: integer
      description: "64bit unsigned integer. The id of every heartbeat increases by 1 and overflows when the maximum representable value is reached"
