description: Token Validator for local allow list of RFID tags, capable of token validation with optional evse id(s)
config:
  allowlist_file:
    description: path/filename of the file containing one RFID token and optional evse id(s) per line
    type: string
    default: /etc/everest/allowlist_rfid.txt
provides:
  token_validator:
    description: Validator interface for auth
    interface: auth_token_validator
