description: A OCPP charge point / charging station module, (supporting 1.6, 2.0.1, 2.1)
config:
  ChargePointConfigPath:
    description: >-
      OCPP 1.6
      Path to the ocpp configuration file. Libocpp defines a JSON schema for this file. Please refer to the documentation
      of libocpp for more information about the configuration options.
    type: string
    default: ocpp-config.json
  CompositeScheduleIntervalS:
    description: >-
      OCPP 1.6 (called PublishChargingScheduleIntervalS)
      OCPP 2.0.1
      Interval in seconds in which composite schedules are received from libocpp
      are be published over MQTT and signalled to connected modules. If the value
      is set to 0, composite schedules are only published when changed by CSMS
    type: integer
    default: 30
  CoreDatabasePath:
    description: >-
      OCPP 2.0.1
      Path to the persistent SQLite database directory. Please refer to the libocpp documentation for more information
      about the database and its structure.
    type: string
    default: /tmp/ocpp201
  CustomMrecErrorMapPath:
    description: >-
      Optional path to a JSON file mapping EVerest error types to OCPP techCodes. Entries overwrite the
      built-in defaults. Leave empty to use only the defaults.
    type: string
    default: ''
  DatabasePath:
    description: >-
      OCPP 1.6
      Path to the persistent SQLite database directory. Please refer to the libocpp documentation for more information
      about the database and its structure.
    type: string
    default: /tmp/ocpp_1_6_charge_point
  DelayOcppStart:
    description: >-
      OCPP 1.6
      OCPP 2.0.1
      Small delay in time (milliseconds) to start the ocpp chargepoint to allow time for the rest of everest to update the connector status.
      This is only used to prevent issues from passing by availlable before preparing on a restart.
    type: integer
    default: 0
  DeviceModelConfigPath:
    description: >-
      OCPP 2.0.1
      Path to the device model component config directory. Libocpp defines a certain schema for these files. Please refer to the documentation
      of libocpp for more information about the configuration options.
    type: string
    default: component_config
  DeviceModelDatabasePath:
    description: >-
      OCPP 1.6 (called DatabasePath)
      OCPP 2.0.1
      Path to the SQLite database for the device model
    type: string
    default: device_model_storage.db
  DeviceModelDatabaseMigrationPath:
    description: >-
      OCPP 2.0.1
      Path to the migration files for both device models
    type: string
    default: device_model_migrations
  EnableExternalWebsocketControl:
    description: >-
      OCPP 1.6
      If true websocket can be disconnected and connected externally. This parameter is for debug and testing purposes.
    type: boolean
    default: false
  EverestDeviceModelDatabasePath:
    description: >-
      OCPP 2.0.1
      Path to the SQLite databse for the EVerest device model. This database stores components and variables
      like EVSE and Connector that are closely related to EVerest and therefore not owned and managed by libocpp.
    type: string
    default: everest_device_model_storage.db
  EnableExternalWebsocketControl:
    description: >-
      OCPP 2.0.1
      If true websocket can be disconnected and connected externally. This parameter is for debug and testing purposes.
    type: boolean
    default: false
  MessageLogPath:
    description: >-
      OCPP 1.6
      OCPP 2.0.1
      Path to directory where logs of all OCPP messages are written to
    type: string
    default: /tmp/everest_ocpp_logs
  MessageQueueResumeDelay:
    description: >-
      OCPP 1.6
      OCPP 2.0.1
      Time (seconds) to delay resuming the message queue after reconnecting. This parameter was introduced because
      some OCTT test cases require that the first message after a reconnect is sent by the CSMS.
    type: integer
    default: 0
  RequestCompositeScheduleDurationS:
    description: >-
      OCPP 1.6 (called PublishChargingScheduleDurationS)
      OCPP 2.0.1
      Time (seconds) for which composite schedules are requested.
      Schedules are requested from now until now + RequestCompositeScheduleDurationS
    type: integer
    default: 600
  RequestCompositeScheduleUnit:
    description: >-
      OCPP 1.6
      OCPP 2.0.1
      Unit in which composite schedules are requested and shared within EVerest. It is recommended to use
      Amps for AC and Watts for DC charging stations.
      Allowed values:
        - 'A' for Amps
        . 'W' for Watts
    type: string
    default: 'A'
  ResetStopDelay:
    description: >-
      OCPP 1.6
      OCPP 2.0.1
      Time (seconds) to delay the stopping of the charge point so that the CSMS has enough time to respond
      to the charge point's last messages before resetting.
    type: integer
    default: 0
  UserConfigPath:
    description: >-
      OCPP 1.6
      Path to the file of the OCPP user config. The user config is used as an overlay for the original config defined
      by the ChargePointConfigPath. Any changes to configuration keys turned out internally or by the CSMS will be
      written to the user config file.
    type: string
    default: user_config.json
  Mode:
    description: >-
      OCPP 1.6
      OCPP 2.0.1
      The operational mode of the module
    type: string
    enum:
      - Prefer1.6
      - Prefer2
      - Only1.6
      - Only2
    default: Only2
provides:
  # probably not needed
  # integration test
  # message_queue.py::test_security_event_delivery_after_reconnect
  # expects it
  # main:
  #   description: This is a OCPP 1.6 charge point
  #   interface: ocpp_1_6_charge_point
  auth_validator:
    description: Validates the provided token using CSMS, AuthorizationList or AuthorizationCache
    interface: auth_token_validator
  auth_provider:
    description: Provides authorization requests by CSMS
    interface: auth_token_provider
  data_transfer:
    description: OCPP data transfer towards the CSMS
    interface: ocpp_data_transfer
  ocpp_generic:
    description: Generic OCPP interface.
    interface: ocpp
  session_cost:
    description: Send session cost
    interface: session_cost
requires:
  auth:
    interface: auth
    min_connections: 1
    max_connections: 1
  charger_information:
    interface: charger_information
    min_connections: 0
    max_connections: 1
  data_transfer:
    interface: ocpp_data_transfer
    min_connections: 0
    max_connections: 1
  display_message:
    interface: display_message
    min_connections: 0
    max_connections: 1
  evse_energy_sink:
    interface: external_energy_limits
    min_connections: 0
    max_connections: 129
  evse_manager:
    interface: evse_manager
    min_connections: 1
    max_connections: 128
  extensions_15118:
    interface: iso15118_extensions
    min_connections: 0
    max_connections: 128
  reservation:
    interface: reservation
    min_connections: 0
    max_connections: 1
  security:
    interface: evse_security
    min_connections: 1
    max_connections: 1
  system:
    interface: system
    min_connections: 1
    max_connections: 1
enable_external_mqtt: true
enable_global_errors: true
