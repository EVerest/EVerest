description: >-
  Applies AC current limits to an EnergyNode based on temperature sensor readings
  and configurable derating curves using linear interpolation between points.
config:
  derating_curves_json:
    description: >-
      Nested JSON object: {module_id: {identification: point_array}}. Each point array holds
      derating points {"temp_C": number, "max_current_A": number}. Points may be in
      any order (the module sorts by ascending temp_C); duplicate temp_C values are
      rejected. The curve is defined from its first point upward: below the first
      point's temp_C no derating is applied (that sensor imposes no limit), between
      points the module linearly interpolates, and at/above the last point the final
      limit is held. A single-point curve therefore means "no limit below temp_C, cap
      at max_current_A at/above temp_C". To cap current even at low temperatures, place
      the first point at a sufficiently low temperature.

      module_id is the temperature provider instance id from active_modules /
      connections.temperature.module_id (not the module type name and not
      implementation_id). identification is Temperature.identification from the
      published reading. Each Temperature.identification in a batch needs a matching curve.
      Readings without identification log a warning and use fallback_max_current_A.

      Every connected temperature provider must have at least one curve. Missing curves at
      runtime log a warning and apply fallback_max_current_A.

      No derating (constant limit at all temperatures):
      { "my_module": {
          "Powermeter":[
            {"temp_C": -20, "max_current_A": 32}, 
            {"temp_C": 25, "max_current_A": 32}, 
            {"temp_C": 80, "max_current_A": 32}
          ]
        }
      }

      With derating (one provider, two identifications):
      { "yeti_driver_1":{
          "Powermeter":[
            { "temp_C":25, "max_current_A":32 },
            { "temp_C":40, "max_current_A":16 },
            { "temp_C":55, "max_current_A":6 }
          ],
          "Connector":[
            { "temp_C":30, "max_current_A":32 },
            { "temp_C":60, "max_current_A":10 }
          ]
        }
      }
    type: string
    default: "{}"
  temperature_provider_ignore_list:
    description: >-
      Comma-separated list of module_id.identification entries to exclude from derating.
      module_id is the temperature provider instance id from connections.temperature.module_id.
      identification is Temperature.identification from the published reading. Ignored readings
      do not contribute to the effective limit. Configuring a derating curve for an ignored
      entry prevents module startup.
    type: string
    default: ""
  fallback_max_current_A:
    description: Conservative limit applied when a temperature reading is missing, stale, or has no matching curve
    type: number
    minimum: 0.0
    default: 0.0
  temperature_stale_timeout_ms:
    description: >-
      Time after which a temperature reading is considered stale. The module also
      re-evaluates limits periodically (at most half this interval) so staleness is
      detected even when a provider stops publishing.
    type: integer
    minimum: 100
    default: 10000
  update_debounce_ms:
    description: >-
      Minimum time between external limit updates when the computed limit increases
      (relaxing derating). Limit decreases are applied immediately for thermal safety.
      Debounced increases are retried on the periodic re-evaluation.
    type: integer
    minimum: 0
    default: 1000
requires:
  temperature:
    interface: temperature_sensor
    min_connections: 1
    max_connections: 16
  energy_node:
    interface: external_energy_limits
    min_connections: 1
    max_connections: 1
