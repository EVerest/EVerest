description: SIL simulator for YETI hardware v1.0
config:
  connector_id:
    description: Connector id of the evse manager to which this simulator is connected to
    type: integer
  reset_powermeter_on_session_start:
    description: Reset absolute powermeter readings to zero when CP changes from state A to B
    type: boolean
    default: true
  dummy_meter_value_send_on_transaction_start:
    description: Send dummy meter start value blob on transaction start
    type: boolean
    default: true
  dummy_meter_value_blob_start:
    description: Dummy meter value blob sent on transaction start to be used for testing
    type: string
    default: "test start value"
  dummy_meter_value_blob_stop:
    description: Dummy meter value blob sent on transaction stop to be used for testing
    type: string
    default: "test stop value"
provides:
  powermeter:
    interface: powermeter
    description: provides the Yeti Internal Power Meter
  temperature_sensor:
    interface: temperature_sensor
    description: Simulated internal temperature derived from powermeter load
  board_support:
    interface: evse_board_support
    description: provides the EVSE board support Interface to low level control pilot, relais, rcd, motor lock
  ev_board_support:
    interface: ev_board_support
    description: provides the EV board support Interface to low level control pilot, relais, rcd
  rcd:
    interface: ac_rcd
    description: Interface for the simulated AC RCD
  connector_lock:
    interface: connector_lock
    description: Interface for the simulated Connector lock
enable_external_mqtt: true
enable_telemetry: true
metadata:
  license: https://opensource.org/licenses/Apache-2.0
  authors:
    - Cornelius Claussen
    - Tobias Marzell (Pionix GmbH)
