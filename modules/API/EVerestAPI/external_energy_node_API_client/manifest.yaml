description: >-
  Energy node API client (site/L1 side). Subscribes to an external_energy_node_API
  server's aggregated energy_flow_request over external MQTT and presents it as a
  local energy_consumer to the site-level EnergyNode (grid connection point). Routes
  enforce_limits from the local EnergyManager back to the remote cluster server via
  external MQTT.

  Run one instance per cluster in the L1 (site-level) EVerest process. The
  server_id config must match the module ID of the corresponding
  external_energy_node_API instance in the cluster EVerest process.
config:
  server_id:
    description: >-
      Module ID of the external_energy_node_API server to connect to. Must match
      the module ID of the corresponding server instance in the cluster EVerest
      process (e.g., "cluster_m0_api").
    type: string
    default: ""
  cfg_heartbeat_interval_ms:
    description: "Interval between two heartbeat messages sent by the API. Values <= 0 disable heartbeat."
    type: integer
    default: 1000
  cfg_communication_check_to_s:
    description: "Maximum time between two communication check events. Values <= 0 disables communication checks."
    type: integer
    default: 5
provides:
  main:
    interface: generic_error
    description: "Provides error types for module communication status."
  energy_grid:
    description: >-
      Energy interface that bridges to the remote cluster server. Connect this to
      the site EnergyNode's (grid connection point) energy_consumer requirement.
      The remote cluster's aggregated energy_flow_request is published here;
      enforce_limits received here are forwarded to the remote cluster.
    interface: energy
enable_external_mqtt: true
metadata:
