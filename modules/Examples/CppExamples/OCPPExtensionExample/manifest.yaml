description: >-
  This is an example module that shows how the OCPP module of EVerest could be extended using the DataTransfer functionality
  and custom configuration keys
config:
  enable:
    description: enable/disable monitoring
    type: boolean
    default: true
    mutability: ReadWrite
  poll_interval:
    description: Polling interval in seconds
    type: number
    default: 0.5
    mutability: ReadWrite
  id:
    description: Integer ID
    type: integer
    default: 100
    mutability: ReadWrite
  keys_to_monitor:
    description: Comma separated list of keys that should be monitored
    type: string
    default: "HeartbeatInterval,SecurityProfile,ExampleConfigurationKey"
    mutability: ReadWrite
provides:
  data_transfer:
    description: OCPP data transfer
    interface: ocpp_data_transfer
requires:
  ocpp:
    interface: ocpp
    min_connections: 1
    max_connections: 1
  data_transfer:
    interface: ocpp_data_transfer
    min_connections: 1
    max_connections: 1

enable_external_mqtt: true
metadata:
  license: https://opensource.org/licenses/Apache-2.0
  authors:
    - Piet Gömpel
